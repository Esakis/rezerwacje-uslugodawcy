<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BookEasy — offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        text-align: center;
        padding: 24px;
      }
      .badge {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: linear-gradient(135deg, #4f46e5, #a855f7);
        color: #fff;
        font-weight: 700;
        font-size: 28px;
        display: grid;
        place-items: center;
        margin: 0 auto 16px;
      }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { color: #64748b; margin: 0 0 20px; }
      button {
        border: 0;
        border-radius: 12px;
        padding: 12px 20px;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #4f46e5, #a855f7);
      }
    </style>
  </head>
  <body>
    <div>
      <div class="badge">B</div>
      <h1>Brak połączenia z internetem</h1>
      <p>Sprawdź sieć i spróbuj ponownie.</p>
      <button onclick="location.reload()">Odśwież</button>
    </div>
  </body>
</html>
